[workspace]
# Don't publish to crates.io — we distribute via Homebrew.
publish = false
# Don't run semver checks on unpublished crates.
semver_check = false

[[package]]
name = "cascade"
release = true
# All workspace crates share the same version.
version_group = "workspace"

[[package]]
name = "cascade-engine"
release = false
version_group = "workspace"

[[package]]
name = "cascade-config"
release = false
version_group = "workspace"

[[package]]
name = "cascade-expr"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-gdrive"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-local"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-nfs"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-fuse"
release = false
version_group = "workspace"

[[package]]
name = "cascade-p2p"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-webdav"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-fskit"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-s3"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-fileprovider"
release = false
version_group = "workspace"

