[workspace]
# Don't publish to crates.io — we distribute via Homebrew.
publish = false
# Don't run semver checks on unpublished crates.
semver_check = false

[[package]]
name = "cascade"
release = true
# All workspace crates share the same version.
version_group = "workspace"
# Pin the tag name. release-plz defaults to a bare `v{version}` tag when only a
# single crate is released and a crate-prefixed `cascade-v{version}` tag when
# several are. The CI release/build jobs and the formula URLs all assume the
# crate-prefixed form, so force it explicitly — otherwise reducing the released
# set to just `cascade` silently switches to bare tags and every build job
# fails checking out a `cascade-v{version}` tag that was never created.
git_tag_name = "cascade-v{{ version }}"

[[package]]
name = "cascade-engine"
release = false
version_group = "workspace"

[[package]]
name = "cascade-config"
release = false
version_group = "workspace"

[[package]]
name = "cascade-expr"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-gdrive"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-local"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-nfs"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-fuse"
release = false
version_group = "workspace"

[[package]]
name = "cascade-p2p"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-webdav"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-fskit"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-s3"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-fileprovider"
release = false
version_group = "workspace"

[[package]]
name = "cascade-backend-p2p"
release = false
version_group = "workspace"

[[package]]
name = "cascade-relay-server"
release = false
version_group = "workspace"

# Internal library crates added after this file was first written. Without an
# explicit release = false they default to release = true and cut their own
# stray release tags (cascade-announce-wire-vX, cascade-presenter-projfs-vX).
[[package]]
name = "cascade-announce-wire"
release = false
version_group = "workspace"

[[package]]
name = "cascade-presenter-projfs"
release = false
version_group = "workspace"
