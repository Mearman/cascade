name: CascadeFileProvideriOS
options:
  bundleIdPrefix: co.uk.mearman.cascade
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    # Ad-hoc signing ("-"): no developer identity or provisioning profile
    # needed, so the build is reproducible on any machine and in CI. This is
    # enough to produce a signed bundle for the Mac and the iOS Simulator.
    # Running the File Provider on a real device additionally needs a real
    # team and a provisioning profile that authorises the app-group and File
    # Provider entitlements (see README); ad-hoc cannot grant those.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_STYLE: Manual

targets:
  CascadeHostApp:
    type: application
    platform: iOS
    sources:
      - path: Host
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.uk.mearman.cascade.ios
        INFOPLIST_FILE: Host/Resources/Host-Info.plist
        CODE_SIGN_ENTITLEMENTS: Host/Resources/Host.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - target: CascadeFileProviderExt
        embed: true

  CascadeFileProviderExt:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension/Sources
      - path: Extension/FFI
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.uk.mearman.cascade.ios.fileprovider
        INFOPLIST_FILE: Extension/Resources/Extension-Info.plist
        CODE_SIGN_ENTITLEMENTS: Extension/Resources/Extension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Extension/FFI"
        # Statically link the Rust archive explicitly, per SDK. The crate emits
        # both a .a and a .dylib into the same directory, so a bare
        # -lcascade_ffi would resolve to the dylib (an absolute build-machine
        # load path that cannot ship in the appex). -force_load pulls the whole
        # archive in. The device and simulator need different arch slices, so
        # the path is conditioned on the SDK.
        "OTHER_LDFLAGS[sdk=iphoneos*]":
          - "-force_load"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios/release/libcascade_ffi.a"
          - "-framework"
          - "CoreFoundation"
        "OTHER_LDFLAGS[sdk=iphonesimulator*]":
          - "-force_load"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios-sim/release/libcascade_ffi.a"
          - "-framework"
          - "CoreFoundation"
