name: CascadeFileProvideriOS
options:
  bundleIdPrefix: co.uk.mearman.cascade
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: Manual

targets:
  CascadeHostApp:
    type: application
    platform: iOS
    sources:
      - path: Host
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.uk.mearman.cascade.ios
        INFOPLIST_FILE: Host/Resources/Host-Info.plist
        CODE_SIGN_ENTITLEMENTS: Host/Resources/Host.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - target: CascadeFileProviderExt
        embed: true

  CascadeFileProviderExt:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension/Sources
      - path: Extension/FFI
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.uk.mearman.cascade.ios.fileprovider
        INFOPLIST_FILE: Extension/Resources/Extension-Info.plist
        CODE_SIGN_ENTITLEMENTS: Extension/Resources/Extension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Extension/FFI"
        # Statically link the Rust archive explicitly. The crate emits both a
        # .a and a .dylib into the same directory, so a bare -lcascade_ffi would
        # resolve to the dylib (an absolute build-machine load path that cannot
        # ship in the appex). -force_load pulls the whole archive into the
        # extension binary instead.
        OTHER_LDFLAGS:
          - "-force_load"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios/release/libcascade_ffi.a"
          - "-framework"
          - "CoreFoundation"
