[workspace]
resolver = "3"
members = [
    "crates/engine",
    "crates/cascade-config",
    "crates/expr",
    "crates/backend-gdrive",
    "crates/presenter-nfs",
    "crates/backend-local",
    "crates/presenter-fuse",
    "crates/presenter-fileprovider",
    "crates/cascade",
    "crates/p2p",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
# Async
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialisation
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
serde_yaml = "0.9"

# Database
rusqlite = { version = "0.40", features = ["bundled"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Expression parser
pest = "2"
pest_derive = "2"

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# HTTP (for backends)
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }
futures-core = "0.3"
