      - name: Save sccache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/sccache
          key: sccache-relay-x86_64-apple-darwin-${{ github.sha }}
      - name: Package archive
