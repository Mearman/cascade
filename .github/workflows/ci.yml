            echo "released=false" >> "$GITHUB_OUTPUT"
            echo 'No cascade binary release detected'
          fi

          exit $RC
      - name: sccache stats
        run: sccache --show-stats
      - name: Save sccache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
